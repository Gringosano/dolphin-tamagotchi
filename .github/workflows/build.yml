name: Build Dolphin Tamagotchi FAP

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi make git python3
      
      - name: Clone Flipper firmware
        run: git clone --recursive https://github.com/flipperdevices/flipperzero-firmware.git
      
      - name: Setup app directory
        run: |
          mkdir -p flipperzero-firmware/applications/external/dolphin_tamagotchi
          cp source/dolphin_tamagotchi.c flipperzero-firmware/applications/external/dolphin_tamagotchi/
          cp source/application.fam flipperzero-firmware/applications/external/dolphin_tamagotchi/
      
      - name: Build FAP
        run: |
          cd flipperzero-firmware
          ./fbt COMPACT=1 DEBUG=0 fap_dolphin_tamagotchi
        continue-on-error: true
      
      - name: List build artifacts
        run: |
          echo "Looking for FAP files..."
          find flipperzero-firmware/build -name "*.fap" -type f 2>/dev/null || echo "No FAP files found"
          echo ""
          echo "Checking apps directory..."
          ls -la flipperzero-firmware/build/apps/ 2>/dev/null || echo "Apps directory not ready"
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dolphin_tamagotchi-build
          path: flipperzero-firmware/build/
          retention-days: 30
